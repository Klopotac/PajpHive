<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Register</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <h1>HiveVoice</h1>
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Your name" autocomplete="name">
  <br>
  <input type="email" id="email" placeholder="Email" autocomplete="email">
  <br>
  <input type="password" id="password" placeholder="Password (min 6 chars)" autocomplete="new-password">
  <br>
  <label>
    <input type="checkbox" id="has-invite"> I have an invite code to join an existing apiary
  </label>
  <br>
  <div id="invite-section" class="hidden">
    <input type="text" id="invite-code" placeholder="Invite code (e.g. ABC123)" maxlength="10" autocomplete="off">
  </div>
  <br>
  <button id="btn-register">Create Account</button>
  <p id="msg"></p>
  <p>Already have an account? <a href="/login.html">Sign In</a></p>

  <script type="module">
    import { register, onAuthChange } from "/js/auth.js";
    import { getApiaryByInviteCode, joinApiary } from "/js/db.js";

    onAuthChange((user) => {
      if (user) window.location.href = "/index.html";
    });

    document.getElementById("has-invite").onchange = (e) => {
      const section = document.getElementById("invite-section");
      e.target.checked
        ? section.classList.remove("hidden")
        : section.classList.add("hidden");
    };

    document.getElementById("btn-register").onclick = async () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const hasInvite = document.getElementById("has-invite").checked;
      const inviteCode = document.getElementById("invite-code").value.trim().toUpperCase();
      const msg = document.getElementById("msg");
      const btn = document.getElementById("btn-register");

      if (!name || !email || !password) {
        msg.textContent = "Please fill in all fields.";
        return;
      }

      btn.disabled = true;
      msg.textContent = "Creating account...";

      try {
        // Validate invite code before creating account (fail fast)
        let apiary = null;
        if (hasInvite && inviteCode) {
          apiary = await getApiaryByInviteCode(inviteCode);
          if (!apiary) {
            msg.textContent = "Invalid invite code. Check it and try again.";
            btn.disabled = false;
            return;
          }
        }

        const user = await register(email, password, name);

        if (apiary) {
          await joinApiary(apiary.id, user.uid);
          // Store the joined apiary so the dashboard opens straight to it
          localStorage.setItem("hv_apiaryId", apiary.id);
          msg.textContent = `Account created and joined "${apiary.name}"! Redirecting...`;
        } else {
          msg.textContent = "Account created! You can join an existing apiary via Settings anytime.";
        }

        // onAuthChange will redirect to /index.html
      } catch (e) {
        msg.textContent = "Error: " + e.message;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
