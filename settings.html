<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Settings</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="sync-banner"></div>

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-title">Settings</div>
    <div class="top-bar-actions"></div>
  </header>

  <main class="page-content" style="padding-bottom: 100px;">

    <!-- Profile Card -->
    <div class="settings-group">
      <div class="settings-group-label">Profile</div>
      <div class="settings-card">
        <div class="settings-row" style="align-items: center; gap: 14px; padding: 16px;">
          <div class="avatar-circle" id="user-avatar">?</div>
          <div>
            <div class="settings-row-title" id="user-name" style="font-size: 17px; font-weight: 600;">Loading…</div>
            <div class="settings-row-subtitle" id="user-email" style="font-size: 13px; color: var(--text-muted); margin-top: 2px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Join Apiary -->
    <div class="settings-group">
      <div class="settings-group-label">Join an Apiary</div>
      <div class="settings-card">
        <div style="padding: 16px 16px 8px;">
          <p style="font-size: 14px; color: var(--text-muted); margin: 0 0 12px;">Have an invite code from another beekeeper?</p>
          <div class="input-row">
            <input type="text" id="join-invite-code" class="input-field" placeholder="Enter invite code (e.g. ABC123)" maxlength="10" autocomplete="off" style="text-transform: uppercase; letter-spacing: 2px; font-weight: 600;">
            <button class="btn btn-primary" id="btn-join-apiary" style="white-space: nowrap;">Join</button>
          </div>
          <p id="join-apiary-msg" class="field-msg" style="min-height: 20px; margin-top: 8px;"></p>
        </div>
      </div>
    </div>

    <!-- My Apiaries -->
    <div class="settings-group">
      <div class="settings-group-label">My Apiaries</div>
      <div class="settings-card" id="apiaries-list">
        <div class="settings-row">
          <span class="settings-row-title" style="color: var(--text-muted);">Loading…</span>
        </div>
      </div>
    </div>

    <!-- Notifications -->
    <div class="settings-group">
      <div class="settings-group-label">Notifications</div>
      <div class="settings-card">
        <div class="settings-row settings-row-tappable" id="row-push-notifications">
          <span class="settings-row-icon">🔔</span>
          <div class="settings-row-body">
            <span class="settings-row-title">Push Notifications</span>
            <span class="settings-row-subtitle" id="push-status">Tap to enable</span>
          </div>
          <span class="settings-row-chevron">›</span>
        </div>
      </div>
    </div>

    <!-- About -->
    <div class="settings-group">
      <div class="settings-group-label">About</div>
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-row-icon">🐝</span>
          <div class="settings-row-body">
            <span class="settings-row-title">HiveVoice</span>
            <span class="settings-row-subtitle">Version 1.0.0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Sign Out -->
    <div class="settings-group">
      <div class="settings-card">
        <div class="settings-row settings-row-tappable settings-row-danger" id="btn-signout">
          <span class="settings-row-icon">🚪</span>
          <div class="settings-row-body">
            <span class="settings-row-title">Sign Out</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Confirm Modal -->
  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal-card">
      <h3 id="confirm-title" class="modal-title">Confirm</h3>
      <p id="confirm-message" class="modal-message"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Sign Out</button>
      </div>
    </div>
  </div>

  <nav id="main-nav" class="bottom-nav"></nav>

  <style>
    .settings-group {
      margin: 0 16px 8px;
    }
    .settings-group-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 16px 4px 6px;
    }
    .settings-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-tappable { cursor: pointer; transition: background 0.15s; }
    .settings-row-tappable:hover { background: var(--hover-bg, rgba(0,0,0,0.04)); }
    .settings-row-tappable:active { background: rgba(0,0,0,0.08); }
    .settings-row-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .settings-row-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .settings-row-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .settings-row-subtitle { font-size: 13px; color: var(--text-muted); }
    .settings-row-chevron { color: var(--text-muted); font-size: 20px; font-weight: 300; }
    .settings-row-danger .settings-row-title { color: var(--danger, #e53e3e); }
    .avatar-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--honey-gradient, linear-gradient(135deg, #f6c90e, #e8951e));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; }
    .input-row .input-field { flex: 1; }
    .field-msg { font-size: 13px; margin: 0; }
    .apiary-member-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .apiary-member-row:last-child { border-bottom: none; }
    .member-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--honey, #f6c90e); flex-shrink: 0; }
    .apiary-header-row { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .apiary-name-text { font-weight: 700; font-size: 15px; color: var(--text-primary); }
    .apiary-role-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--honey-light, #fff3cd); color: var(--honey-dark, #a16207); }
  </style>

  <script type="module">
    import { requireAuth, logOut, clearCachedApiaryId, cacheApiaryId } from "/js/auth.js";
    import {
      getApiariesByUser, getApiaryByInviteCode, joinApiary, getDisplayName
    } from "/js/db.js";
    import { messaging } from "/js/firebase-config.js";
    import { buildNav } from "/js/ui.js";

    buildNav("main-nav");

    const user = await requireAuth();

    // ── Profile ────────────────────────────────────────────────────────────────
    const displayName = user.displayName || user.email?.split("@")[0] || "Beekeeper";
    document.getElementById("user-name").textContent = displayName;
    document.getElementById("user-email").textContent = user.email;
    document.getElementById("user-avatar").textContent = displayName.charAt(0).toUpperCase();

    // ── Apiaries List ──────────────────────────────────────────────────────────
    async function loadApiaries() {
      const list = document.getElementById("apiaries-list");

      let apiaries;
      try {
        apiaries = await getApiariesByUser(user.uid);
      } catch (e) {
        list.innerHTML = `<div class="settings-row"><span class="settings-row-subtitle" style="color:var(--danger)">Failed to load: ${e.message}</span></div>`;
        return;
      }

      if (apiaries.length === 0) {
        list.innerHTML = `<div class="settings-row"><span class="settings-row-subtitle">No apiaries yet. Create one from the Dashboard or join one above.</span></div>`;
        return;
      }

      const allUids = [...new Set(apiaries.flatMap(a => a.members))];
      const nameMap = {};
      await Promise.all(allUids.map(async uid => {
        nameMap[uid] = await getDisplayName(uid, user.uid);
      }));

      list.innerHTML = apiaries.map(a => {
        const isOwner = a.ownerId === user.uid;
        const membersHtml = a.members.map(uid =>
          `<div class="apiary-member-row">
            <div class="member-dot"></div>
            <span style="font-size:14px; color:var(--text-primary);">${nameMap[uid] || uid}${uid === user.uid ? " (you)" : ""}${uid === a.ownerId ? " · Owner" : ""}</span>
          </div>`
        ).join("");
        return `
          <div class="apiary-header-row">
            <span class="apiary-name-text">🍯 ${a.name}</span>
            <span class="apiary-role-badge">${isOwner ? "Owner" : "Partner"}</span>
          </div>
          ${membersHtml}
        `;
      }).join('<div style="height:1px; background:var(--border);"></div>');
    }

    loadApiaries();

    // ── Join Apiary ────────────────────────────────────────────────────────────
    const joinInput = document.getElementById("join-invite-code");
    joinInput.addEventListener("input", () => {
      joinInput.value = joinInput.value.toUpperCase();
    });
    joinInput.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-join-apiary").click();
    });

    document.getElementById("btn-join-apiary").onclick = async () => {
      const msg = document.getElementById("join-apiary-msg");
      const btn = document.getElementById("btn-join-apiary");
      const code = joinInput.value.trim().toUpperCase();
      if (!code) { msg.textContent = "Please enter an invite code."; msg.style.color = "var(--danger)"; return; }
      btn.disabled = true;
      msg.textContent = "Joining…";
      msg.style.color = "var(--text-muted)";
      try {
        const apiary = await getApiaryByInviteCode(code);
        if (!apiary) {
          msg.textContent = "Invalid invite code. Double-check and try again.";
          msg.style.color = "var(--danger)";
          btn.disabled = false;
          return;
        }
        await joinApiary(apiary.id, user.uid);
        cacheApiaryId(apiary.id);
        joinInput.value = "";
        msg.textContent = `✓ Joined "${apiary.name}"! Go to the Dashboard to see your hives.`;
        msg.style.color = "var(--success, #38a169)";
        await loadApiaries();
      } catch (e) {
        msg.textContent = "Error: " + e.message;
        msg.style.color = "var(--danger)";
      } finally {
        btn.disabled = false;
      }
    };

    // ── Push Notifications ─────────────────────────────────────────────────────
    const pushRow = document.getElementById("row-push-notifications");
    const pushStatus = document.getElementById("push-status");

    // Check current permission state
    if ("Notification" in window) {
      if (Notification.permission === "granted") pushStatus.textContent = "Enabled";
      else if (Notification.permission === "denied") pushStatus.textContent = "Blocked in browser settings";
    } else {
      pushStatus.textContent = "Not supported in this browser";
    }

    pushRow.onclick = async () => {
      if (!("Notification" in window)) {
        pushStatus.textContent = "Not supported in this browser";
        return;
      }
      if (Notification.permission === "denied") {
        pushStatus.textContent = "Blocked — enable in browser settings";
        return;
      }
      if (!messaging) {
        pushStatus.textContent = "Push messaging not configured";
        return;
      }
      try {
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          pushStatus.textContent = "Enabled ✓";
          pushStatus.style.color = "var(--success, #38a169)";
        } else {
          pushStatus.textContent = "Permission denied";
          pushStatus.style.color = "var(--danger)";
        }
      } catch (e) {
        pushStatus.textContent = "Error: " + e.message;
      }
    };

    // ── Sign Out (with modal confirm) ──────────────────────────────────────────
    const modal = document.getElementById("confirm-modal");
    const confirmOk = document.getElementById("confirm-ok");
    const confirmCancel = document.getElementById("confirm-cancel");

    document.getElementById("btn-signout").onclick = () => {
      modal.classList.remove("hidden");
    };
    confirmCancel.onclick = () => modal.classList.add("hidden");
    modal.onclick = e => { if (e.target === modal) modal.classList.add("hidden"); };

    confirmOk.onclick = async () => {
      confirmOk.disabled = true;
      confirmOk.textContent = "Signing out…";
      await logOut();
      clearCachedApiaryId();
      window.location.href = "/login.html";
    };
  </script>
</body>
</html>
