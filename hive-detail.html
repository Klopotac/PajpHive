<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Hive Details</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="sync-banner"></div>
  <a href="/index.html">&larr; Back to Dashboard</a>
  <h1 id="hive-title">Hive Details</h1>

  <section>
    <h2>Edit Hive</h2>
    <input type="text" id="edit-name" placeholder="Hive name">
    <button id="btn-rename">Save Name</button>
    <p id="rename-msg"></p>
  </section>

  <section>
    <h2>NFC Setup</h2>
    <p>Program your NFC chip with this URL:</p>
    <p id="nfc-url"></p>
    <button id="btn-copy-nfc">Copy NFC URL</button>
    <p id="copy-msg"></p>
  </section>

  <section>
    <h2>Add Reminder</h2>
    <input type="text" id="reminder-text" placeholder="Reminder text">
    <input type="date" id="reminder-date">
    <button id="btn-add-reminder">Add Reminder</button>
    <p id="reminder-msg"></p>
  </section>

  <section>
    <h2>Upcoming Reminders</h2>
    <div id="reminders-list"><p>Loading...</p></div>
  </section>

  <section id="hive-danger-zone" class="hidden">
    <h2>Danger Zone</h2>
    <p>Permanently delete this hive and all its inspections and reminders. This cannot be undone.</p>
    <p>Type <strong id="hive-name-confirm-hint"></strong> to confirm:</p>
    <input
      type="text"
      id="delete-hive-name"
      placeholder="Type the hive name to confirm"
      maxlength="60"
      autocomplete="off"
    >
    <button id="btn-delete-hive" disabled>Delete Hive</button>
    <p id="hive-danger-msg"></p>
  </section>

  <section>
    <h2>Inspection History</h2>
    <div id="inspections-list"><p>Loading...</p></div>
  </section>

  <nav id="main-nav"></nav>

  <script type="module">
    import { requireAuth } from "/js/auth.js";
    import {
      getApiary, getHive, updateHive, listenInspections,
      listenReminders, addReminder, deleteReminder,
      toggleReminder, deleteHiveDeep, getDisplayName, getRemindersOnce
    } from "/js/db.js";
    import { buildNav, copyToClipboard, formatDateTime, formatDate, updateSyncBanner } from "/js/ui.js";
    import { pendingCount, openOfflineDB } from "/js/offline.js";

    buildNav("main-nav");
    openOfflineDB();

    const params = new URLSearchParams(window.location.search);
    const hiveId = params.get("id");
    let unsubInspections = null;
    let unsubReminders = null;
    let currentHive = null;

    const user = await requireAuth();

    if (!hiveId) {
      document.body.innerHTML = "<p>No hive ID specified.</p><a href='/index.html'>Go back</a>";
      throw new Error("No hive ID");
    }

    let hive, apiary;
    try {
      hive = await getHive(hiveId);
    } catch (e) {
      document.body.innerHTML = `<p>Error loading hive: ${e.message}</p><a href='/index.html'>Go back</a>`;
      throw e;
    }

    if (!hive) {
      document.body.innerHTML = "<p>Hive not found.</p><a href='/index.html'>Go back</a>";
      throw new Error("Hive not found");
    }
    currentHive = hive;

    try {
      apiary = await getApiary(hive.apiaryId);
    } catch (e) {
      document.body.innerHTML = `<p>Error loading apiary: ${e.message}</p><a href='/index.html'>Go back</a>`;
      throw e;
    }

    if (!apiary || !apiary.members.includes(user.uid)) {
      document.body.innerHTML = "<p>You do not have access to this hive.</p><a href='/index.html'>Back</a>";
      throw new Error("Access denied");
    }

    const pending = await pendingCount();
    updateSyncBanner(pending);

    document.title = `HiveVoice — ${hive.name}`;
    document.getElementById("hive-title").textContent = hive.name;
    document.getElementById("edit-name").value = hive.name;

    const nfcUrl = hive.nfcUrl || `${window.location.origin}/hive.html?id=${hiveId}`;
    document.getElementById("nfc-url").textContent = nfcUrl;

    // ── Rename ────────────────────────────────────────────────────────────────
    document.getElementById("btn-rename").onclick = async () => {
      const newName = document.getElementById("edit-name").value.trim();
      const msg = document.getElementById("rename-msg");
      if (!newName) { msg.textContent = "Name cannot be empty."; return; }
      const btn = document.getElementById("btn-rename");
      btn.disabled = true;
      try {
        await updateHive(hiveId, { name: newName });
        currentHive = { ...currentHive, name: newName };
        document.getElementById("hive-title").textContent = newName;
        document.getElementById("hive-name-confirm-hint").textContent = newName;
        document.getElementById("delete-hive-name").value = "";
        document.getElementById("btn-delete-hive").disabled = true;
        msg.textContent = "Name updated.";
      } catch (e) {
        msg.textContent = "Error: " + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    // ── Copy NFC URL ──────────────────────────────────────────────────────────
    document.getElementById("btn-copy-nfc").onclick = async () => {
      const ok = await copyToClipboard(nfcUrl);
      const msg = document.getElementById("copy-msg");
      if (ok) {
        msg.textContent = "Copied!";
      } else {
        msg.textContent = "Auto-copy failed. Copy manually: " + nfcUrl;
      }
    };

    // ── Add Reminder ──────────────────────────────────────────────────────────
    document.getElementById("btn-add-reminder").onclick = async () => {
      const text = document.getElementById("reminder-text").value.trim();
      const date = document.getElementById("reminder-date").value;
      const msg = document.getElementById("reminder-msg");
      if (!text) { msg.textContent = "Please enter reminder text."; return; }
      if (!date) { msg.textContent = "Please select a date."; return; }
      const btn = document.getElementById("btn-add-reminder");
      btn.disabled = true;
      msg.textContent = "Saving...";
      try {
        await addReminder(hive.apiaryId, hiveId, text, date);
        document.getElementById("reminder-text").value = "";
        document.getElementById("reminder-date").value = "";
        msg.textContent = "Reminder added!";
        // Manually refresh the list in case the real-time listener is waiting on index
        const fresh = await getRemindersOnce(hive.apiaryId);
        renderReminders(fresh.filter(r => r.hiveId === hiveId));
      } catch (e) {
        msg.textContent = "Error saving reminder: " + e.message;
        console.error("addReminder failed:", e);
      } finally {
        btn.disabled = false;
      }
    };

    // ── Reminders list ────────────────────────────────────────────────────────
    function renderReminders(hiveReminders) {
      const list = document.getElementById("reminders-list");
      if (hiveReminders.length === 0) {
        list.innerHTML = "<p>No reminders yet.</p>";
        return;
      }
      list.innerHTML = hiveReminders.map(r => `
        <div>
          <label>
            <input type="checkbox" data-id="${r.id}" ${r.done ? "checked" : ""}>
            ${r.text} — ${formatDate(r.dueDate)} ${r.done ? "<em>(done)</em>" : ""}
          </label>
          <button data-delete-reminder="${r.id}">Delete</button>
        </div>
      `).join("");

      list.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.onchange = () => toggleReminder(cb.dataset.id, cb.checked);
      });
      list.querySelectorAll("[data-delete-reminder]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("Delete this reminder?")) return;
          try {
            await deleteReminder(btn.dataset.deleteReminder);
            // Refresh manually in case real-time listener is pending
            const fresh = await getRemindersOnce(hive.apiaryId);
            renderReminders(fresh.filter(r => r.hiveId === hiveId));
          } catch (e) {
            alert("Error deleting reminder: " + e.message);
          }
        };
      });
    }

    unsubReminders = listenReminders(hive.apiaryId, (reminders) => {
      renderReminders(reminders.filter(r => r.hiveId === hiveId));
    });

    // ── Danger Zone (owner only) ──────────────────────────────────────────────
    if (apiary.ownerId === user.uid) {
      const dangerZone = document.getElementById("hive-danger-zone");
      const input = document.getElementById("delete-hive-name");
      const btn = document.getElementById("btn-delete-hive");
      const msg = document.getElementById("hive-danger-msg");

      dangerZone.classList.remove("hidden");
      document.getElementById("hive-name-confirm-hint").textContent = hive.name;

      input.addEventListener("input", () => {
        btn.disabled = input.value.trim() !== currentHive.name;
      });

      btn.onclick = async () => {
        if (input.value.trim() !== currentHive.name) return;
        btn.disabled = true;
        msg.textContent = "Deleting...";
        try {
          await deleteHiveDeep(hiveId);
          window.location.href = "/index.html";
        } catch (e) {
          msg.textContent = "Error: " + e.message;
          btn.disabled = (input.value.trim() !== currentHive.name);
        }
      };
    }

    // ── Inspection History ────────────────────────────────────────────────────
    unsubInspections = listenInspections(hiveId, async (inspections) => {
      const list = document.getElementById("inspections-list");
      if (inspections.length === 0) {
        list.innerHTML = "<p>No inspections yet.</p>";
        return;
      }

      const uids = [...new Set(inspections.map(i => i.recordedBy).filter(Boolean))];
      const nameMap = {};
      await Promise.all(uids.map(async uid => {
        nameMap[uid] = await getDisplayName(uid, user.uid);
      }));

      list.innerHTML = inspections.map(ins => `
        <div>
          <strong>${formatDateTime(ins.createdAt)}</strong>
          by ${nameMap[ins.recordedBy] || "Unknown"}<br>
          ${ins.notes ? `<p>Notes: ${ins.notes}</p>` : ""}
          ${ins.transcript ? `<p>Transcript: ${ins.transcript}</p>` : ""}
          ${ins.audioUrl
            ? `<audio controls src="${ins.audioUrl}"></audio>`
            : "<em>Audio pending sync</em>"
          }
        </div>
        <hr>
      `).join("");
    });

    window.addEventListener("beforeunload", () => {
      if (unsubInspections) unsubInspections();
      if (unsubReminders) unsubReminders();
    });
  </script>
</body>
</html>
