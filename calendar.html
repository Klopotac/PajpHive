<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Calendar</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="sync-banner"></div>
  <h1>Shared Calendar</h1>

  <div id="no-apiary-msg" class="hidden">
    <p>No apiary selected. <a href="/index.html">Go to the Dashboard</a> to set one up.</p>
  </div>

  <div id="calendar-controls">
    <button id="btn-prev">&larr;</button>
    <span id="month-label"></span>
    <button id="btn-next">&rarr;</button>
  </div>

  <table id="calendar-grid" border="1">
    <thead>
      <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
      </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
  </table>

  <section>
    <h2 id="selected-date-label">Select a date to see tasks</h2>
    <div id="day-tasks"></div>
  </section>

  <nav id="main-nav"></nav>

  <script type="module">
    import { requireAuth, getCachedApiaryId } from "/js/auth.js";
    import { listenReminders, toggleReminder, deleteReminder, listenHives } from "/js/db.js";
    import { buildNav, updateSyncBanner } from "/js/ui.js";
    import { pendingCount, openOfflineDB } from "/js/offline.js";

    buildNav("main-nav");
    openOfflineDB();

    const user = await requireAuth();
    const apiaryId = getCachedApiaryId();

    const pending = await pendingCount();
    updateSyncBanner(pending);

    if (!apiaryId) {
      document.getElementById("no-apiary-msg").classList.remove("hidden");
      document.getElementById("calendar-controls").classList.add("hidden");
      document.getElementById("calendar-grid").classList.add("hidden");
    }

    let reminders = [];
    let hiveNameMap = {};
    let unsubReminders = null;
    let unsubHives = null;
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = null;

    if (apiaryId) {
      // Listen for hive names so we can label each reminder with the hive
      unsubHives = listenHives(apiaryId, (hives) => {
        hiveNameMap = {};
        hives.forEach(h => { hiveNameMap[h.id] = h.name; });
        renderCalendar();
        if (selectedDate) showDayTasks(selectedDate);
      });

      unsubReminders = listenReminders(apiaryId, (data) => {
        reminders = data;
        renderCalendar();
        if (selectedDate) showDayTasks(selectedDate);
      });
    }

    function renderCalendar() {
      const label = document.getElementById("month-label");
      label.textContent = new Date(currentYear, currentMonth, 1)
        .toLocaleDateString(undefined, { month: "long", year: "numeric" });

      const body = document.getElementById("calendar-body");
      body.innerHTML = "";

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();

      // Build day → count map for reminder dots
      const dayMap = {};
      reminders.forEach(r => {
        if (!r.dueDate || r.done) return;
        const d = r.dueDate.toDate ? r.dueDate.toDate() : new Date(r.dueDate);
        if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
          const key = d.getDate();
          dayMap[key] = (dayMap[key] || 0) + 1;
        }
      });

      let day = 1;
      for (let row = 0; row < 6; row++) {
        const tr = document.createElement("tr");
        for (let col = 0; col < 7; col++) {
          const td = document.createElement("td");
          const isEmpty = (row === 0 && col < firstDay) || day > daysInMonth;
          if (!isEmpty) {
            const d = day;
            const isToday =
              d === today.getDate() &&
              currentMonth === today.getMonth() &&
              currentYear === today.getFullYear();
            td.textContent = d + (dayMap[d] ? ` (${dayMap[d]})` : "");
            if (isToday) td.style.fontWeight = "bold";
            td.style.cursor = "pointer";
            td.onclick = () => {
              selectedDate = new Date(currentYear, currentMonth, d);
              showDayTasks(selectedDate);
            };
            day++;
          }
          tr.appendChild(td);
        }
        body.appendChild(tr);
        if (day > daysInMonth) break;
      }
    }

    function showDayTasks(date) {
      const label = document.getElementById("selected-date-label");
      label.textContent = date.toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric", year: "numeric"
      });

      const container = document.getElementById("day-tasks");
      const dayTasks = reminders.filter(r => {
        if (!r.dueDate) return false;
        const d = r.dueDate.toDate ? r.dueDate.toDate() : new Date(r.dueDate);
        return (
          d.getFullYear() === date.getFullYear() &&
          d.getMonth() === date.getMonth() &&
          d.getDate() === date.getDate()
        );
      });

      if (dayTasks.length === 0) {
        container.innerHTML = "<p>No tasks for this day.</p>";
        return;
      }

      container.innerHTML = dayTasks.map(r => {
        const hiveName = hiveNameMap[r.hiveId] || "Unknown Hive";
        return `
          <div>
            <label>
              <input type="checkbox" data-id="${r.id}" ${r.done ? "checked" : ""}>
              <strong>${hiveName}:</strong> ${r.text} ${r.done ? "<em>(done)</em>" : ""}
            </label>
            <button data-delete-reminder="${r.id}" style="margin-left:8px">Delete</button>
          </div>
        `;
      }).join("");

      container.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.onchange = async () => {
          await toggleReminder(cb.dataset.id, cb.checked);
        };
      });
      container.querySelectorAll("[data-delete-reminder]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("Delete this reminder?")) return;
          await deleteReminder(btn.dataset.deleteReminder);
        };
      });
    }

    document.getElementById("btn-prev").onclick = () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    };
    document.getElementById("btn-next").onclick = () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    };

    renderCalendar();

    window.addEventListener("beforeunload", () => {
      if (unsubReminders) unsubReminders();
      if (unsubHives) unsubHives();
    });
  </script>
</body>
</html>
