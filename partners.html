<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Partners</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="sync-banner"></div>
  <h1>Partners</h1>

  <div id="apiary-bar">
    <select id="apiary-select"></select>
  </div>

  <section>
    <h2>Invite Code</h2>
    <p>Share this code so partners can join this apiary (max 3 members total).</p>
    <p id="invite-code-display"></p>
    <button id="btn-copy-invite">Copy Code</button>
    <button id="btn-new-invite">Generate New Code</button>
    <p id="invite-msg"></p>
  </section>

  <section>
    <h2>Current Members</h2>
    <div id="members-list"><p>Loading...</p></div>
  </section>

  <nav id="main-nav"></nav>

  <script type="module">
    import { requireAuth, getCachedApiaryId, cacheApiaryId } from "/js/auth.js";
    import { getApiary, getApiariesByUser, regenerateInviteCode, getDisplayName } from "/js/db.js";
    import { buildNav, copyToClipboard } from "/js/ui.js";

    buildNav("main-nav");

    const user = await requireAuth();
    let apiaries = await getApiariesByUser(user.uid);
    let apiaryId = getCachedApiaryId();
    let currentApiary = null;

    if (!apiaries.find(a => a.id === apiaryId)) apiaryId = apiaries[0]?.id;

    if (apiaries.length === 0) {
      document.querySelector("h1").insertAdjacentHTML(
        "afterend",
        "<p>You have no apiaries yet. Create one from the Dashboard.</p>"
      );
    }

    // Build apiary selector
    const select = document.getElementById("apiary-select");
    select.innerHTML = apiaries.map(a =>
      `<option value="${a.id}"${a.id === apiaryId ? " selected" : ""}>${a.name}</option>`
    ).join("");
    select.onchange = () => {
      apiaryId = select.value;
      cacheApiaryId(apiaryId);
      loadApiary();
    };

    async function loadApiary() {
      document.getElementById("members-list").innerHTML = "<p>Loading...</p>";
      document.getElementById("invite-code-display").textContent = "";

      const apiary = await getApiary(apiaryId);
      if (!apiary) {
        document.getElementById("members-list").innerHTML = "<p>Could not load apiary data.</p>";
        return;
      }
      currentApiary = apiary;

      const isOwner = apiary.ownerId === user.uid;
      const isFull = apiary.members.length >= 3;

      // Invite code (only meaningful for owners to share)
      if (isOwner) {
        document.getElementById("invite-code-display").textContent = apiary.inviteCode;
        document.getElementById("btn-new-invite").disabled = false;
        document.getElementById("invite-msg").textContent = isFull
          ? "Apiary is full (3/3). Remove a member to invite someone new."
          : `${apiary.members.length}/3 members.`;
      } else {
        document.getElementById("invite-code-display").textContent = "(only the owner can see and share the invite code)";
        document.getElementById("btn-new-invite").disabled = true;
        document.getElementById("btn-copy-invite").disabled = true;
      }

      // Resolve display names
      const membersList = document.getElementById("members-list");
      const nameEntries = await Promise.all(apiary.members.map(async uid => {
        const name = await getDisplayName(uid, user.uid);
        const role = uid === apiary.ownerId ? "Owner" : "Partner";
        return `<li>${name} — ${role}</li>`;
      }));
      membersList.innerHTML = `<ul>${nameEntries.join("")}</ul>`;

      document.getElementById("btn-copy-invite").onclick = async () => {
        const ok = await copyToClipboard(apiary.inviteCode);
        document.getElementById("invite-msg").textContent = ok ? "Code copied!" : "Copy failed.";
      };

      document.getElementById("btn-new-invite").onclick = async () => {
        if (!isOwner) return;
        if (!confirm("Generate a new invite code? The old code will stop working.")) return;
        try {
          const newCode = await regenerateInviteCode(apiaryId);
          document.getElementById("invite-code-display").textContent = newCode;
          document.getElementById("invite-msg").textContent = "New code active.";
          currentApiary = { ...currentApiary, inviteCode: newCode };
        } catch (e) {
          document.getElementById("invite-msg").textContent = "Error: " + e.message;
        }
      };
    }

    if (apiaryId) loadApiary();
  </script>
</body>
</html>
