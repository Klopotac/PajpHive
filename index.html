<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="sync-banner"></div>

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar-logo">HiveVoice</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="topbar-action" id="btn-new-apiary" title="New Apiary" aria-label="Create new apiary">＋</button>
    </div>
  </header>

  <div class="page">

    <!-- ── Onboarding: no apiaries yet ── -->
    <div id="first-apiary-form" class="hidden">
      <div class="welcome-card" style="margin-top:24px;">
        <div class="welcome-emoji">🍯</div>
        <div class="welcome-title">Welcome to HiveVoice!</div>
        <div class="welcome-sub">Create your first apiary to start tracking your hives, or join one with an invite code in Settings.</div>
        <div class="welcome-actions">
          <button class="btn-primary" id="btn-show-create-form">Create My First Apiary</button>
          <a href="/settings.html" style="display:block;text-align:center;font-size:0.88rem;margin-top:4px;opacity:0.7;">Have an invite code? Go to Settings →</a>
        </div>
      </div>
      <div id="create-first-form" class="inline-form hidden" style="margin-top:0;">
        <label style="display:block;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;">Apiary Name</label>
        <input type="text" id="first-apiary-name" placeholder="e.g. Garden Apiary" maxlength="60" style="margin-bottom:10px;">
        <div style="display:flex;gap:8px;">
          <button class="btn-primary" id="btn-save-first-apiary" style="flex:1;margin:0;">Create</button>
          <button id="btn-cancel-create-first" style="margin:0;background:var(--off);border-color:#ccc;color:var(--muted);">Cancel</button>
        </div>
        <p id="first-apiary-msg" style="font-size:0.82rem;min-height:18px;margin-top:8px;"></p>
      </div>
    </div>

    <!-- ── Main: apiary list ── -->
    <div id="dashboard" class="hidden">
      <p style="font-size:0.82rem;color:var(--muted);padding:12px 0 8px;">Your Apiaries</p>
      <div id="apiaries-list"></div>
    </div>

    <!-- ── Loading state ── -->
    <div id="loading-state" style="text-align:center;padding:60px 0;color:var(--muted);font-size:0.9rem;">
      Loading…
    </div>

  </div><!-- /.page -->

  <!-- New Apiary Sheet -->
  <div class="sheet-overlay" id="new-apiary-sheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">New Apiary</div>
      <div class="field">
        <label>Apiary Name</label>
        <input type="text" id="new-apiary-name" placeholder="e.g. Rooftop Apiary" maxlength="60">
      </div>
      <button class="btn-primary" id="btn-save-apiary" style="margin:0 0 8px;">Create Apiary</button>
      <button id="btn-cancel-apiary" style="width:100%;background:var(--off);border-color:#ccc;color:var(--muted);margin:0;">Cancel</button>
      <p id="new-apiary-msg" style="font-size:0.82rem;min-height:18px;margin-top:8px;"></p>
    </div>
  </div>

  <!-- Invite Code Toast (after creating apiary) -->
  <div class="modal-overlay hidden" id="invite-modal">
    <div class="modal">
      <div class="modal-title">🎉 Apiary Created!</div>
      <p class="modal-body">Share this invite code so partners can join:</p>
      <div class="invite-code-box">
        <div class="invite-code-text" id="invite-code-display"></div>
      </div>
      <div class="modal-actions" style="flex-direction:column;gap:8px;">
        <button class="btn-primary" id="btn-copy-invite" style="margin:0;">Copy Code</button>
        <button id="btn-dismiss-invite" style="margin:0;background:var(--off);border-color:#ccc;color:var(--muted);">Done</button>
      </div>
    </div>
  </div>

  <nav id="main-nav"></nav>

  <style>
    .apiary-card {
      display: flex;
      align-items: center;
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      margin-bottom: 12px;
      text-decoration: none;
      color: var(--black);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
      gap: 14px;
    }
    .apiary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .apiary-card:active { transform: scale(0.98); }
    .apiary-card-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--gold-lt); border: 2px solid var(--gold-dk);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .apiary-card-body { flex: 1; min-width: 0; }
    .apiary-card-name { font-weight: 800; font-size: 1.05rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apiary-card-meta { font-size: 0.78rem; color: var(--muted); }
    .apiary-card-arrow { font-size: 1.4rem; color: var(--muted); flex-shrink: 0; }
  </style>

  <script type="module">
    import { onAuthChange, getCachedApiaryId, cacheApiaryId, getCurrentUser } from "/js/auth.js";
    import { getApiariesByUser, createApiary } from "/js/db.js";
    import { buildNav, updateSyncBanner, copyToClipboard } from "/js/ui.js";
    import { syncPending, pendingCount, openOfflineDB } from "/js/offline.js";

    buildNav("main-nav");
    openOfflineDB();

    onAuthChange(async (user) => {
      if (!user) { window.location.href = "/login.html"; return; }
      await init(user);
    });

    async function init(user) {
      document.getElementById("loading-state").style.display = "block";
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("first-apiary-form").classList.add("hidden");

      let apiaries;
      try {
        apiaries = await getApiariesByUser(user.uid);
      } catch (e) {
        document.getElementById("loading-state").textContent = "Failed to load: " + e.message;
        return;
      }

      document.getElementById("loading-state").style.display = "none";

      if (apiaries.length === 0) {
        document.getElementById("first-apiary-form").classList.remove("hidden");
        return;
      }

      document.getElementById("dashboard").classList.remove("hidden");
      renderApiaries(apiaries, user);

      // Sync offline recordings
      if (navigator.onLine) {
        try {
          const cached = getCachedApiaryId();
          const targetId = cached || apiaries[0].id;
          const synced = await syncPending(targetId);
          if (synced > 0) updateSyncBanner(0, `Synced ${synced} offline recording${synced > 1 ? "s" : ""}.`);
        } catch (_) {}
      }
      const pending = await pendingCount();
      updateSyncBanner(pending);
    }

    function renderApiaries(apiaries, user) {
      const list = document.getElementById("apiaries-list");
      list.innerHTML = apiaries.map(a => {
        const hiveWord = ""; // we don't have hive counts here without extra query — keep it clean
        const isOwner = a.ownerId === user.uid;
        const memberCount = a.members?.length ?? 1;
        return `
          <a class="apiary-card" href="/apiary.html?id=${a.id}">
            <div class="apiary-card-icon">🍯</div>
            <div class="apiary-card-body">
              <div class="apiary-card-name">${a.name}</div>
              <div class="apiary-card-meta">${isOwner ? "Owner" : "Partner"} · ${memberCount} member${memberCount !== 1 ? "s" : ""}</div>
            </div>
            <div class="apiary-card-arrow">›</div>
          </a>`;
      }).join("");
    }

    // ── New Apiary Sheet ─────────────────────────────────────────────────────
    const sheet = document.getElementById("new-apiary-sheet");

    document.getElementById("btn-new-apiary").onclick = () => {
      sheet.classList.add("open");
      document.getElementById("new-apiary-name").focus();
    };
    document.getElementById("btn-cancel-apiary").onclick = closeSheet;
    sheet.onclick = e => { if (e.target === sheet) closeSheet(); };
    function closeSheet() {
      sheet.classList.remove("open");
      document.getElementById("new-apiary-name").value = "";
      document.getElementById("new-apiary-msg").textContent = "";
    }

    document.getElementById("new-apiary-name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-save-apiary").click();
    });

    document.getElementById("btn-save-apiary").onclick = async () => {
      const name = document.getElementById("new-apiary-name").value.trim();
      const msg  = document.getElementById("new-apiary-msg");
      const btn  = document.getElementById("btn-save-apiary");
      if (!name) { msg.textContent = "Please enter a name."; msg.style.color = "var(--danger)"; return; }
      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const user = getCurrentUser();
        const result = await createApiary(user.uid, name);
        cacheApiaryId(result.id);
        closeSheet();
        showInviteModal(result.inviteCode);
        const apiaries = await getApiariesByUser(user.uid);
        renderApiaries(apiaries, user);
        document.getElementById("first-apiary-form").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
      } catch (e) {
        msg.textContent = "Error: " + e.message; msg.style.color = "var(--danger)";
      } finally {
        btn.disabled = false; btn.textContent = "Create Apiary";
      }
    };

    // ── First apiary create form ─────────────────────────────────────────────
    document.getElementById("btn-show-create-form").onclick = () => {
      document.getElementById("create-first-form").classList.remove("hidden");
      document.getElementById("btn-show-create-form").classList.add("hidden");
      document.getElementById("first-apiary-name").focus();
    };
    document.getElementById("btn-cancel-create-first").onclick = () => {
      document.getElementById("create-first-form").classList.add("hidden");
      document.getElementById("btn-show-create-form").classList.remove("hidden");
    };

    document.getElementById("first-apiary-name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-save-first-apiary").click();
    });

    document.getElementById("btn-save-first-apiary").onclick = async () => {
      const name = document.getElementById("first-apiary-name").value.trim();
      const msg  = document.getElementById("first-apiary-msg");
      const btn  = document.getElementById("btn-save-first-apiary");
      if (!name) { msg.textContent = "Please enter a name."; msg.style.color = "var(--danger)"; return; }
      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const user = getCurrentUser();
        const result = await createApiary(user.uid, name);
        cacheApiaryId(result.id);
        const apiaries = await getApiariesByUser(user.uid);
        document.getElementById("first-apiary-form").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        renderApiaries(apiaries, user);
        showInviteModal(result.inviteCode);
      } catch (e) {
        msg.textContent = "Error: " + e.message; msg.style.color = "var(--danger)";
        btn.disabled = false; btn.textContent = "Create";
      }
    };

    // ── Invite modal ─────────────────────────────────────────────────────────
    function showInviteModal(code) {
      document.getElementById("invite-code-display").textContent = code;
      document.getElementById("invite-modal").classList.remove("hidden");
    }
    document.getElementById("btn-copy-invite").onclick = async () => {
      const code = document.getElementById("invite-code-display").textContent;
      const ok = await copyToClipboard(code);
      document.getElementById("btn-copy-invite").textContent = ok ? "✓ Copied!" : "Copy failed";
      setTimeout(() => { document.getElementById("btn-copy-invite").textContent = "Copy Code"; }, 2000);
    };
    document.getElementById("btn-dismiss-invite").onclick = () => {
      document.getElementById("invite-modal").classList.add("hidden");
    };
    document.getElementById("invite-modal").onclick = e => {
      if (e.target === document.getElementById("invite-modal"))
        document.getElementById("invite-modal").classList.add("hidden");
    };
  </script>
</body>
</html>
