<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Dashboard</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="sync-banner"></div>
  <h1>HiveVoice</h1>

  <!-- Apiary selector bar -->
  <div id="apiary-bar" class="hidden">
    <select id="apiary-select"></select>
    <button id="btn-new-apiary">+ New Apiary</button>
  </div>

  <!-- First-time setup: no apiaries yet -->
  <div id="first-apiary-form" class="hidden">
    <h2>Welcome to HiveVoice!</h2>
    <p>Create your first apiary to get started, or join an existing one via an invite code in Settings.</p>
    <input type="text" id="first-apiary-name" placeholder="Apiary name (e.g. Garden Apiary)" maxlength="60">
    <button id="btn-save-first-apiary">Create Apiary</button>
    <p id="first-apiary-msg"></p>
  </div>

  <!-- New apiary inline form -->
  <div id="new-apiary-form" class="hidden">
    <input type="text" id="new-apiary-name" placeholder="Apiary name (e.g. Garden Apiary)" maxlength="60">
    <button id="btn-save-apiary">Create</button>
    <button id="btn-cancel-apiary">Cancel</button>
    <p id="new-apiary-msg"></p>
  </div>

  <!-- Invite code display (shown after creating an apiary) -->
  <div id="invite-code-notice" class="hidden">
    <p>Apiary created! Your invite code is: <strong id="new-invite-code-display"></strong></p>
    <button id="btn-copy-new-invite">Copy Code</button>
    <button id="btn-dismiss-invite">OK</button>
  </div>

  <div id="hive-controls" class="hidden">
    <button id="btn-add-hive">+ Add Hive</button>
  </div>

  <div id="add-hive-form" class="hidden">
    <input type="text" id="new-hive-name" placeholder="Hive name (e.g. Hive 1)" maxlength="60">
    <button id="btn-save-hive">Save</button>
    <button id="btn-cancel-hive">Cancel</button>
    <p id="add-hive-msg"></p>
  </div>

  <div id="hives-list">
    <p>Loading...</p>
  </div>

  <nav id="main-nav"></nav>

  <script type="module">
    import { onAuthChange, getCachedApiaryId, cacheApiaryId } from "/js/auth.js";
    import { getApiariesByUser, createApiary, listenHives, createHive } from "/js/db.js";
    import { buildNav, updateSyncBanner, formatDate, copyToClipboard } from "/js/ui.js";
    import { syncPending, pendingCount, openOfflineDB } from "/js/offline.js";

    let unsubHives = null;
    let apiaryId = null;
    let apiaries = [];

    buildNav("main-nav");
    openOfflineDB();

    onAuthChange(async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }
      await init(user);
    });

    async function init(user) {
      document.getElementById("hives-list").innerHTML = "<p>Loading...</p>";

      try {
        apiaries = await getApiariesByUser(user.uid);
      } catch (e) {
        document.getElementById("hives-list").innerHTML = `<p>Failed to load apiaries: ${e.message}. Check your connection and refresh.</p>`;
        return;
      }

      if (apiaries.length === 0) {
        // First time — show inline form instead of prompt()
        document.getElementById("first-apiary-form").classList.remove("hidden");
        document.getElementById("hives-list").innerHTML = "";
        return;
      }

      showDashboard(user);
    }

    async function showDashboard(user) {
      document.getElementById("first-apiary-form").classList.add("hidden");
      document.getElementById("apiary-bar").classList.remove("hidden");
      document.getElementById("hive-controls").classList.remove("hidden");

      const cached = getCachedApiaryId();
      const match = apiaries.find(a => a.id === cached);
      apiaryId = match ? match.id : apiaries[0].id;
      cacheApiaryId(apiaryId);

      buildApiarySelector();
      loadHives();

      // Sync pending offline recordings silently — use banner, not alert
      if (navigator.onLine) {
        try {
          const synced = await syncPending(apiaryId);
          if (synced > 0) {
            const banner = document.getElementById("sync-banner");
            banner.textContent = `Synced ${synced} offline recording${synced > 1 ? "s" : ""}.`;
            banner.classList.add("visible");
            setTimeout(() => banner.classList.remove("visible"), 4000);
          }
        } catch (e) {
          console.warn("Sync error:", e);
        }
      }
      const pending = await pendingCount();
      updateSyncBanner(pending);
    }

    // First-time apiary creation
    document.getElementById("btn-save-first-apiary").onclick = async () => {
      const name = document.getElementById("first-apiary-name").value.trim();
      const msg = document.getElementById("first-apiary-msg");
      if (!name) { msg.textContent = "Please enter a name."; return; }
      const btn = document.getElementById("btn-save-first-apiary");
      btn.disabled = true;
      msg.textContent = "Creating...";
      try {
        const { getCurrentUser } = await import("/js/auth.js");
        const user = getCurrentUser();
        const result = await createApiary(user.uid, name);
        cacheApiaryId(result.id);
        apiaries = await getApiariesByUser(user.uid);
        await showDashboard(user);
        showInviteNotice(result.inviteCode);
      } catch (e) {
        msg.textContent = "Error: " + e.message;
        btn.disabled = false;
      }
    };

    function showInviteNotice(code) {
      const notice = document.getElementById("invite-code-notice");
      document.getElementById("new-invite-code-display").textContent = code;
      notice.classList.remove("hidden");
    }

    document.getElementById("btn-copy-new-invite").onclick = async () => {
      const code = document.getElementById("new-invite-code-display").textContent;
      await copyToClipboard(code);
      document.getElementById("btn-copy-new-invite").textContent = "Copied!";
    };
    document.getElementById("btn-dismiss-invite").onclick = () => {
      document.getElementById("invite-code-notice").classList.add("hidden");
    };

    function buildApiarySelector() {
      const select = document.getElementById("apiary-select");
      select.innerHTML = apiaries.map(a =>
        `<option value="${a.id}"${a.id === apiaryId ? " selected" : ""}>${a.name}</option>`
      ).join("");
      select.onchange = () => {
        apiaryId = select.value;
        cacheApiaryId(apiaryId);
        loadHives();
      };
    }

    function loadHives() {
      if (unsubHives) unsubHives();
      document.getElementById("hives-list").innerHTML = "<p>Loading hives...</p>";
      try {
        unsubHives = listenHives(apiaryId, renderHives);
      } catch (e) {
        document.getElementById("hives-list").innerHTML = `<p>Failed to load hives: ${e.message}</p>`;
      }
    }

    function renderHives(hives) {
      const list = document.getElementById("hives-list");
      if (hives.length === 0) {
        list.innerHTML = "<p>No hives yet. Add your first hive!</p>";
        return;
      }
      list.innerHTML = hives.map(h => `
        <div>
          <strong>${h.name}</strong><br>
          Last inspection: ${formatDate(h.lastInspection)}<br>
          <a href="/hive.html?id=${h.id}">Open Recording</a> |
          <a href="/hive-detail.html?id=${h.id}">Details</a>
        </div>
        <hr>
      `).join("");
    }

    document.getElementById("btn-new-apiary").onclick = () => {
      document.getElementById("new-apiary-form").classList.remove("hidden");
    };
    document.getElementById("btn-cancel-apiary").onclick = () => {
      document.getElementById("new-apiary-form").classList.add("hidden");
      document.getElementById("new-apiary-msg").textContent = "";
    };
    document.getElementById("btn-save-apiary").onclick = async () => {
      const name = document.getElementById("new-apiary-name").value.trim();
      const msg = document.getElementById("new-apiary-msg");
      const btn = document.getElementById("btn-save-apiary");
      if (!name) { msg.textContent = "Please enter a name."; return; }
      btn.disabled = true;
      msg.textContent = "Creating...";
      try {
        const { getCurrentUser } = await import("/js/auth.js");
        const user = getCurrentUser();
        const result = await createApiary(user.uid, name);
        apiaries = await getApiariesByUser(user.uid);
        apiaryId = result.id;
        cacheApiaryId(apiaryId);
        buildApiarySelector();
        loadHives();
        document.getElementById("new-apiary-name").value = "";
        document.getElementById("new-apiary-form").classList.add("hidden");
        msg.textContent = "";
        showInviteNotice(result.inviteCode);
      } catch (e) {
        msg.textContent = "Error: " + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    document.getElementById("btn-add-hive").onclick = () => {
      document.getElementById("add-hive-form").classList.remove("hidden");
    };
    document.getElementById("btn-cancel-hive").onclick = () => {
      document.getElementById("add-hive-form").classList.add("hidden");
      document.getElementById("add-hive-msg").textContent = "";
    };
    document.getElementById("btn-save-hive").onclick = async () => {
      const name = document.getElementById("new-hive-name").value.trim();
      const msg = document.getElementById("add-hive-msg");
      const btn = document.getElementById("btn-save-hive");
      if (!name) { msg.textContent = "Please enter a hive name."; return; }
      btn.disabled = true;
      try {
        await createHive(apiaryId, name);
        document.getElementById("new-hive-name").value = "";
        document.getElementById("add-hive-form").classList.add("hidden");
      } catch (e) {
        msg.textContent = "Error: " + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    window.addEventListener("beforeunload", () => { if (unsubHives) unsubHives(); });
  </script>
</body>
</html>
