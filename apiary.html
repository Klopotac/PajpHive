<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveVoice — Apiary</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="sync-banner"></div>

  <!-- Top Bar -->
  <header class="topbar">
    <a href="/index.html" class="topbar-action" style="font-size:1.5rem;text-decoration:none;" aria-label="Back">‹</a>
    <span class="topbar-title" id="apiary-title">Apiary</span>
    <button class="topbar-action" id="btn-open-settings" title="Apiary Settings" aria-label="Apiary settings">⚙️</button>
  </header>

  <div class="page">
    <!-- Hives list -->
    <div id="hives-list" style="margin-top:12px;">
      <p style="color:var(--muted);text-align:center;padding:40px 0;">Loading hives…</p>
    </div>
  </div>

  <!-- FAB: Add Hive -->
  <button class="fab" id="btn-fab-add-hive" title="Add Hive" aria-label="Add a new hive">＋</button>

  <!-- Add Hive Sheet -->
  <div class="sheet-overlay" id="add-hive-sheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Add a Hive</div>
      <div class="field">
        <label>Hive Name</label>
        <input type="text" id="new-hive-name" placeholder="e.g. Hive 1, Back Garden Left" maxlength="60">
      </div>
      <button class="btn-primary" id="btn-save-hive" style="margin:0 0 8px;">Add Hive</button>
      <button id="btn-cancel-hive" style="width:100%;background:var(--off);border-color:#ccc;color:var(--muted);margin:0;">Cancel</button>
      <p id="add-hive-msg" style="font-size:0.82rem;min-height:18px;margin-top:8px;"></p>
    </div>
  </div>

  <!-- Apiary Settings Sheet -->
  <div class="sheet-overlay" id="settings-sheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="settings-sheet-title">Apiary Settings</div>

      <!-- Rename -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:6px;">Apiary Name</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="rename-apiary-input" maxlength="60" style="flex:1;margin:0;">
          <button id="btn-rename-apiary" style="margin:0;white-space:nowrap;">Save</button>
        </div>
        <p id="rename-msg" style="font-size:0.82rem;min-height:16px;margin-top:6px;"></p>
      </div>

      <!-- Members -->
      <div style="margin-bottom:20px;">
        <div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:8px;">Members <span id="members-count"></span></div>
        <div id="members-list" style="background:var(--off);border:2px solid var(--black);border-radius:var(--radius);overflow:hidden;"></div>
      </div>

      <!-- Invite Code (owner only) -->
      <div id="invite-section" class="hidden" style="margin-bottom:20px;">
        <div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:8px;">Invite Code</div>
        <div class="invite-code-box">
          <div class="invite-code-text" id="invite-code-display"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="btn-copy-invite" style="flex:1;margin:0;">Copy Code</button>
          <button id="btn-regen-invite" style="margin:0;background:var(--off);border-color:#ccc;font-size:0.8rem;">New Code</button>
        </div>
        <p id="invite-msg" style="font-size:0.82rem;min-height:16px;margin-top:6px;"></p>
      </div>

      <!-- Danger Zone (owner only) -->
      <div id="danger-zone" class="hidden" style="border:2px solid var(--danger);border-radius:var(--radius);padding:16px;">
        <div style="font-size:0.88rem;font-weight:800;color:var(--danger);margin-bottom:8px;">⚠️ Danger Zone</div>
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:10px;">Permanently delete this apiary and all its hives, inspections, and reminders. This cannot be undone.</p>
        <p style="font-size:0.82rem;margin-bottom:6px;">Type <strong id="apiary-name-hint"></strong> to confirm:</p>
        <input type="text" id="delete-apiary-confirm" placeholder="Type apiary name" autocomplete="off" style="margin-bottom:8px;">
        <button id="btn-delete-apiary" disabled style="width:100%;margin:0;background:var(--white);border-color:var(--danger);color:var(--danger);">Delete Apiary</button>
        <p id="apiary-danger-msg" style="font-size:0.82rem;min-height:16px;margin-top:6px;"></p>
      </div>

      <button id="btn-close-settings" style="width:100%;margin-top:16px;margin-bottom:0;background:var(--off);border-color:#ccc;color:var(--muted);">Close</button>
    </div>
  </div>

  <!-- Confirm modal (regen code / delete) -->
  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal">
      <div class="modal-title" id="confirm-title">Confirm</div>
      <p class="modal-body" id="confirm-message"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" style="margin:0;background:var(--off);border-color:#ccc;color:var(--muted);">Cancel</button>
        <button id="confirm-ok" style="margin:0;">Confirm</button>
      </div>
    </div>
  </div>

  <nav id="main-nav"></nav>

  <style>
    .hive-card {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--white); border: 2px solid var(--black);
      border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .hive-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .hive-card-name { font-weight: 800; font-size: 1.05rem; }
    .hive-card-badge {
      font-size: 0.72rem; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; background: var(--gold-lt); border: 1px solid var(--gold-dk);
      color: #7a5c00; white-space: nowrap; flex-shrink: 0;
    }
    .hive-card-meta { font-size: 0.8rem; color: var(--muted); }
    .hive-card-actions { display: flex; gap: 8px; }
    .btn-inspect {
      flex: 1; margin: 0; padding: 10px 14px; font-size: 0.88rem;
    }
    .btn-details {
      margin: 0; padding: 10px 14px; font-size: 0.88rem;
      background: var(--off); border-color: #ccc;
    }
    .btn-details:hover { background: var(--white); border-color: var(--black); box-shadow: none; }

    .member-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-bottom: 1px solid #eee;
      font-size: 0.88rem;
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--gold-lt); border: 1.5px solid var(--gold-dk);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    }
    .member-name { flex: 1; font-weight: 600; }
    .member-role { font-size: 0.72rem; color: var(--muted); }

    .empty-state {
      text-align: center; padding: 52px 20px;
      color: var(--muted); font-size: 0.92rem;
    }
    .empty-state-icon { font-size: 2.8rem; margin-bottom: 12px; }
  </style>

  <script type="module">
    import { requireAuth, getCachedApiaryId, cacheApiaryId, clearCachedApiaryId } from "/js/auth.js";
    import {
      getApiary, listenHives, createHive, renameApiary,
      deleteApiaryDeep, regenerateInviteCode, getDisplayName
    } from "/js/db.js";
    import { buildNav, formatDate, copyToClipboard, showConfirm } from "/js/ui.js";

    buildNav("main-nav");
    const user = await requireAuth();

    // ── Resolve apiary ID from URL ────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    let apiaryId = params.get("id");
    if (!apiaryId) { window.location.href = "/index.html"; }
    cacheApiaryId(apiaryId);

    let currentApiary = null;
    let unsubHives = null;

    // ── Load apiary ───────────────────────────────────────────────────────────
    currentApiary = await getApiary(apiaryId);
    if (!currentApiary) { window.location.href = "/index.html"; }

    document.title = `${currentApiary.name} — HiveVoice`;
    document.getElementById("apiary-title").textContent = currentApiary.name;

    // ── Listen to hives ───────────────────────────────────────────────────────
    unsubHives = listenHives(apiaryId, renderHives);
    window.addEventListener("beforeunload", () => { if (unsubHives) unsubHives(); });

    function renderHives(hives) {
      const list = document.getElementById("hives-list");
      if (hives.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🐝</div>
            <p style="font-weight:700;font-size:1rem;color:var(--black);margin-bottom:6px;">No hives yet</p>
            <p>Tap ＋ to add your first hive to this apiary.</p>
          </div>`;
        return;
      }
      list.innerHTML = hives.map(h => {
        const lastDate = h.lastInspection ? formatDate(h.lastInspection) : null;
        return `
          <div class="hive-card">
            <div class="hive-card-top">
              <div class="hive-card-name">${h.name}</div>
              ${lastDate ? `<div class="hive-card-badge">📋 ${lastDate}</div>` : `<div class="hive-card-badge" style="background:var(--off);border-color:#ccc;color:var(--muted);">No inspections</div>`}
            </div>
            <div class="hive-card-meta">Last inspection: ${lastDate ?? "Never"}</div>
            <div class="hive-card-actions">
              <button class="btn-inspect" onclick="location.href='/hive.html?id=${h.id}'">🎙 Inspect</button>
              <button class="btn-details" onclick="location.href='/hive-detail.html?id=${h.id}'">Details</button>
            </div>
          </div>`;
      }).join("");
    }

    // ── Add Hive Sheet ────────────────────────────────────────────────────────
    const addSheet = document.getElementById("add-hive-sheet");
    document.getElementById("btn-fab-add-hive").onclick = () => {
      addSheet.classList.add("open");
      document.getElementById("new-hive-name").focus();
    };
    document.getElementById("btn-cancel-hive").onclick = closeAddSheet;
    addSheet.onclick = e => { if (e.target === addSheet) closeAddSheet(); };
    function closeAddSheet() {
      addSheet.classList.remove("open");
      document.getElementById("new-hive-name").value = "";
      document.getElementById("add-hive-msg").textContent = "";
    }

    document.getElementById("new-hive-name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-save-hive").click();
    });

    document.getElementById("btn-save-hive").onclick = async () => {
      const name = document.getElementById("new-hive-name").value.trim();
      const msg  = document.getElementById("add-hive-msg");
      const btn  = document.getElementById("btn-save-hive");
      if (!name) { msg.textContent = "Please enter a hive name."; msg.style.color = "var(--danger)"; return; }
      btn.disabled = true; btn.textContent = "Adding…";
      try {
        await createHive(apiaryId, name);
        closeAddSheet();
      } catch (e) {
        msg.textContent = "Error: " + e.message; msg.style.color = "var(--danger)";
      } finally { btn.disabled = false; btn.textContent = "Add Hive"; }
    };

    // ── Settings Sheet ────────────────────────────────────────────────────────
    const settingsSheet = document.getElementById("settings-sheet");
    const isOwner = currentApiary.ownerId === user.uid;

    document.getElementById("btn-open-settings").onclick = () => openSettingsSheet();
    document.getElementById("btn-close-settings").onclick = () => settingsSheet.classList.remove("open");
    settingsSheet.onclick = e => { if (e.target === settingsSheet) settingsSheet.classList.remove("open"); };

    async function openSettingsSheet() {
      // Populate rename
      document.getElementById("rename-apiary-input").value = currentApiary.name;
      document.getElementById("rename-msg").textContent = "";

      // Members
      const nameMap = {};
      await Promise.all(currentApiary.members.map(async uid => {
        nameMap[uid] = await getDisplayName(uid, user.uid);
      }));
      document.getElementById("members-count").textContent = `(${currentApiary.members.length}/3)`;
      document.getElementById("members-list").innerHTML = currentApiary.members.map(uid => {
        const initial = (nameMap[uid] || "?").charAt(0).toUpperCase();
        const roleLabel = uid === currentApiary.ownerId ? "Owner" : "Partner";
        const isYou = uid === user.uid;
        return `
          <div class="member-row">
            <div class="member-avatar">${initial}</div>
            <span class="member-name">${nameMap[uid]}${isYou ? " (you)" : ""}</span>
            <span class="member-role">${roleLabel}</span>
          </div>`;
      }).join("");

      // Invite code (owner only)
      if (isOwner) {
        document.getElementById("invite-section").classList.remove("hidden");
        document.getElementById("invite-code-display").textContent = currentApiary.inviteCode;
        document.getElementById("invite-msg").textContent = "";
        if (currentApiary.members.length >= 3) {
          document.getElementById("invite-msg").textContent = "Apiary is full (max 3 members).";
        }
        document.getElementById("danger-zone").classList.remove("hidden");
        document.getElementById("apiary-name-hint").textContent = currentApiary.name;
        // Reset danger zone
        document.getElementById("delete-apiary-confirm").value = "";
        document.getElementById("btn-delete-apiary").disabled = true;
        document.getElementById("apiary-danger-msg").textContent = "";
      }

      settingsSheet.classList.add("open");
    }

    // ── Rename ────────────────────────────────────────────────────────────────
    document.getElementById("btn-rename-apiary").onclick = async () => {
      const name = document.getElementById("rename-apiary-input").value.trim();
      const msg  = document.getElementById("rename-msg");
      const btn  = document.getElementById("btn-rename-apiary");
      if (!name) { msg.textContent = "Name cannot be empty."; msg.style.color = "var(--danger)"; return; }
      if (name === currentApiary.name) { msg.textContent = "That's already the name."; msg.style.color = "var(--muted)"; return; }
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        await renameApiary(apiaryId, name);
        currentApiary.name = name;
        document.getElementById("apiary-title").textContent = name;
        document.getElementById("apiary-name-hint").textContent = name;
        document.title = `${name} — HiveVoice`;
        msg.textContent = "✓ Renamed!"; msg.style.color = "var(--success)";
        setTimeout(() => { msg.textContent = ""; }, 2500);
      } catch (e) {
        msg.textContent = "Error: " + e.message; msg.style.color = "var(--danger)";
      } finally { btn.disabled = false; btn.textContent = "Save"; }
    };

    // ── Copy invite code ──────────────────────────────────────────────────────
    document.getElementById("btn-copy-invite").onclick = async () => {
      const ok = await copyToClipboard(currentApiary.inviteCode);
      const btn = document.getElementById("btn-copy-invite");
      btn.textContent = ok ? "✓ Copied!" : "Copy failed";
      setTimeout(() => { btn.textContent = "Copy Code"; }, 2000);
    };

    // ── Regen invite code ─────────────────────────────────────────────────────
    document.getElementById("btn-regen-invite").onclick = async () => {
      const confirmed = await showConfirm(
        "Generate New Code?",
        "The old invite code will stop working immediately.",
        "Generate"
      );
      if (!confirmed) return;
      try {
        const newCode = await regenerateInviteCode(apiaryId);
        currentApiary.inviteCode = newCode;
        document.getElementById("invite-code-display").textContent = newCode;
        document.getElementById("invite-msg").textContent = "✓ New code active.";
        document.getElementById("invite-msg").style.color = "var(--success)";
      } catch (e) {
        document.getElementById("invite-msg").textContent = "Error: " + e.message;
        document.getElementById("invite-msg").style.color = "var(--danger)";
      }
    };

    // ── Delete apiary confirm input ───────────────────────────────────────────
    document.getElementById("delete-apiary-confirm").addEventListener("input", e => {
      document.getElementById("btn-delete-apiary").disabled =
        e.target.value.trim() !== currentApiary.name;
    });

    document.getElementById("btn-delete-apiary").onclick = async () => {
      const confirmed = await showConfirm(
        "Delete Apiary?",
        `This will permanently delete "${currentApiary.name}" and ALL its hives and data. This cannot be undone.`,
        "Delete"
      );
      if (!confirmed) return;
      const btn = document.getElementById("btn-delete-apiary");
      const msg = document.getElementById("apiary-danger-msg");
      btn.disabled = true; btn.textContent = "Deleting…";
      msg.textContent = ""; msg.style.color = "var(--muted)";
      try {
        await deleteApiaryDeep(apiaryId);
        clearCachedApiaryId();
        window.location.href = "/index.html";
      } catch (e) {
        msg.textContent = "Error: " + e.message; msg.style.color = "var(--danger)";
        btn.disabled = false; btn.textContent = "Delete Apiary";
      }
    };

    // ── Confirm modal (used by showConfirm helper) ────────────────────────────
    document.getElementById("confirm-cancel").onclick = () =>
      document.getElementById("confirm-modal").classList.add("hidden");
    document.getElementById("confirm-modal").onclick = e => {
      if (e.target === document.getElementById("confirm-modal"))
        document.getElementById("confirm-modal").classList.add("hidden");
    };
  </script>
</body>
</html>
